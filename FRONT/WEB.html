<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula inicial de CSS</title>
    <style>
        *{
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f0f4f8;
            line-height: 1.6;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 2em auto;
            padding: 20px;
            border: 2px solid #ebe5e5;
            border-radius: 10px;
            background-color: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            margin-top: 0;
            color: #2a9d8f;
        }
        .destaque {
            background: #264653;
            border-radius: 6px;
            border-left: 4px solid #2a9d8f;
            padding: 10px 12px;
            color: #fff;
        }
        #objetivo {
            color: #1d3557;
            font-weight: bold;
        }
        button {
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            background: #2a9d8f;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #1d3557;
        }
        /* comentario... */
        h2{
            margin-top: 0;
            color: #e76f51;
        }
        .bloco-aula {
            background: #fefae0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .pai {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            background-color: #e9ecef;
            height: 120px;
            width: 100%;
            max-width: 500px;
            border: 2px dashed #264653;
            padding: 10px;
            margin: 20px auto;
        }
        .filha {
            width: 80px;
            height: 80px;
            background: #264653;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border-radius: 8px;
            color: white;
        }
        .nao-encolhe{
           flex-shrink: 0;
            background: #2a9d8f;
        }
        .encolhe{
            flex-shrink: 1;
            background: #e9c46a;
        }
        .encolhe-muito{
             flex-shrink: 2;
            background: #e76f51;
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>CSS inicial</h1>
        <p>Exemplo básico de uso de estilos em página HTML.</p>
        <p class="destaque"> Aqui iremos usar uma classe de destaque de bloco</p>
        <p id="objetivo"> Objetivo: entender seletores, cores, etc...</p>

        <section class="bloco-aula" aria-labelledby="aula-seletores">
            <h2 id="aula-seletores">Etapa 1- Tipos de seletor</h2>
            <p>Elementos: <code>h1, p...</code></p>
            <p>Classe (.): <code>.nomeClasse</code></p>
            <p> ID (#): <code>#identificador</code></p>
        </section>
        <div class="pai">
            <div class="filha nao-encolhe">1 (fixo)</div>
            <div class="filha encolhe">2 (normal)</div>
            <div class="filha encolhe-muito">3 (mais)</div>
        </div>
        <button type="button">Botão de Exemplo</button>
    </main>
    
</body>
</html>
